name: Deploy website

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Refresh download packs
        run: ./scripts/build-downloads.sh

      - name: Prepare site files
        run: |
          mkdir -p _site
          cp -R \
            index.html \
            README.md \
            ACKNOWLEDGEMENTS.md \
            AI_NOTICE.md \
            ATTRIBUTION.md \
            CODE_OF_CONDUCT.md \
            CONTRIBUTING.md \
            GOVERNANCE.md \
            LICENSE.md \
            LICENSES \
            assets \
            docs \
            downloads \
            examples \
            playbooks \
            templates \
            _site/
          touch _site/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy site
        id: deployment
        uses: actions/deploy-pages@v4
